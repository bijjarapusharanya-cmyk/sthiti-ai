<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sthiti AI | Humanitarian Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --bg-warm: #FCF9F6; --primary: #F59E0B; --dark: #1A1A1A; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
:root { 
    --bg-warm: #FCF9F6; 
    --primary: #F59E0B; /* Sthiti Orange */
    --dark: #1A1A1A; 
}
        body {
            background: var(--bg-warm);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Keeps the dashboard contained */
        }

        nav {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--dark);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        main {
            display: flex;
            flex: 1;
            padding: 0 2rem 2rem;
            gap: 2rem;
            overflow: hidden;
        }

        #map {
            flex: 2;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 1;
        }

        #sidebar {
            flex: 1;
            max-width: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .highlight {
            background: rgba(245, 158, 11, 0.2);
            padding: 0 5px;
        }

        .case-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 4px solid var(--primary);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .tag {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action {
            width: 100%;
            background: var(--dark);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Custom File Upload Styling */
        #file-input { display: none; }
        .custom-file-upload {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--dark);
            color: #FDFBF7;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        .custom-file-upload:hover { background-color: var(--primary); }

        #loading {
            display: none;
            color: #F59E0B;
            font-size: 14px;
            font-weight: 600;
            margin: 15px 0;
            text-align: center;
        }

        #locationStatus {
            font-size: 0.75rem;
            margin-top: 5px;
            display: block;
            color: #666;
        }
        nav {
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between; /* This pushes logo left and profile right */
    align-items: center;
    background: white;
}

.nav-right {
    display: flex;
    align-items: center;
}

.profile-link {
    text-decoration: none;
    transition: 0.3s;
}

.profile-icon {
    width: 45px;
    height: 45px;
    background: var(--bg-warm);
    border: 2px solid var(--primary);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.profile-icon:hover {
    background: var(--primary);
    color: white;
    transform: scale(1.05);
}
    </style>
</head>

<body>

<nav>
    <div class="logo">Sthiti AI</div>
    
    <div class="nav-right">
        <span style="font-weight: 600; font-size: 0.8rem; letter-spacing: 1px; color: #888; margin-right: 20px;">
            HYDERABAD / 2026
        </span>
        <a href="/user.html" class="profile-link">
            <div class="profile-icon">👤</div>
        </a>
    </div>
</nav>

<main>
    <div id="sidebar">
        <h1>Justice starts where <span class="highlight">neglect</span> ends.</h1>
        <p style="margin-bottom: 20px; color: #666; font-size: 0.95rem;">
            Capture or upload a street photo to detect Sthiti.
        </p>

        <button class="btn-action" onclick="getLocation()">📍 Use My Location</button>
        <span id="locationStatus">Location not set (using random fallback)</span>

        <div class="upload-section" style="margin-top: 15px;">
            <input type="file" id="file-input" style="display: none;" onchange="analyzeImage(event)" accept="image/*" />
<label for="file-input" class="custom-file-upload">
    📸 Capture Street Sthiti
</label>
        </div>

        <p id="loading">✨ AI is analyzing the scene...</p>

        <div id="cases" style="margin-top: 25px;"></div>
    </div>

    <div id="map"></div>
    <div id="success-modal" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); z-index: 10000; text-align: center; width: 350px;">
    <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
    <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 10px;">Sthiti Captured!</h2>
    <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">The report has been successfully stored in our humanitarian database.</p>
   <button onclick="window.location.href='/dashboard'" class="btn-action">Return to Home</button>
</div>

<div id="modal-overlay" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 9999;"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// 🌍 Initialize Map
const map = L.map('map', { zoomControl: false }).setView([17.3850, 78.4867], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let userLocation = null;

// 📍 Get User Location
function getLocation() {
    const status = document.getElementById('locationStatus');
    status.innerText = "⌛ Detecting location...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                status.innerText = "✅ Location active";
                map.setView([userLocation.lat, userLocation.lng], 15);
                L.marker([userLocation.lat, userLocation.lng]).addTo(map)
                    .bindPopup("<b>Your Current Position</b>").openPopup();
            },
            () => { status.innerText = "❌ Permission denied"; }
        );
    } else {
        status.innerText = "❌ Not supported";
    }
}

// 📸 Analyze Image
async function analyzeImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Show loading, Hide button temporarily
    document.getElementById('loading').style.display = 'block';
    
    const reader = new FileReader();
    reader.onloadend = async () => {
        try {
            const base64 = reader.result;
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64 })
            });

            const data = await res.json();
            document.getElementById('loading').style.display = 'none';

            if (data.found) {
                // Add Case Card
                const card = `
                <div class="case-card">
                    <span class="tag">Priority: ${data.score}/10</span>
                    <p style="margin: 12px 0; line-height: 1.4;">${data.description}</p>
                    <button class="btn-action" style="background:#F59E0B">Dispatch Aid</button>
                </div>`;

                document.getElementById('cases').insertAdjacentHTML('afterbegin', card);

                // Use captured location or fallback to a random spot in Hyderabad
                const lat = userLocation ? userLocation.lat : 17.385 + (Math.random() - 0.5) * 0.05;
                const lng = userLocation ? userLocation.lng : 78.486 + (Math.random() - 0.5) * 0.05;

                L.marker([lat, lng]).addTo(map)
                    .bindPopup(`<b>Sthiti Alert:</b><br>${data.description}`)
                    .openPopup();
            } else {
                alert("No distress detected in this image.");
            }
        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            alert("🚨 Server error. Is the Node.js backend running?");
        }
    };
    reader.readAsDataURL(file);
}

    try {
        const response = await fetch('/analyze', {
            method: 'POST',

// 3. ADD THIS FUNCTION BELOW analyzeImage
function showSuccessModal() {
    // 1. Find the modal element and show it
    const modal = document.getElementById('success-modal'); 
    if (modal) {
        modal.style.display = 'flex';
    }

    // 2. Target the specific button inside the modal
    // In your screenshot, the button says "Return to Home"
    const btn = document.querySelector('.modal-button');
    
    if (btn) {
        // Change the text if you want, or keep it as "Return to Home"
        btn.textContent = "Return to Dashboard"; 
        
        // 3. SET THE REDIRECT
        // We use '/dashboard' because that is the route in your server.js
        // that points to index.html
        btn.onclick = () => {
            window.location.href = '/dashboard'; 
        };
    }
}

    const reader = new FileReader();

        try {
            const base64 = reader.result;
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64 })
            });

            const data = await res.json();
            document.getElementById('loading').style.display = 'none';

const report = {
    id: Date.now(),
    image: base64, // 📸 This saves the actual image!
    description: data.description || "Manual Report",
    score: data.score || 5,
    timestamp: new Date().toLocaleString(),
    location: userLocation || { lat: 17.385, lng: 78.486 }
};

            // Get existing cases or start a new list
            let db = JSON.parse(localStorage.getItem('sthiti_db')) || [];
            db.push(report);
            localStorage.setItem('sthiti_db', JSON.stringify(db));

            // 🏆 SHOW SUCCESS MODAL
            document.getElementById('success-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';

        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            alert("Upload successful! (Data stored locally)");
            // Show modal even if AI fails for demo purposes
            document.getElementById('success-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }
    };
    reader.readAsDataURL(file);
}
</script>
</body>
</html>
