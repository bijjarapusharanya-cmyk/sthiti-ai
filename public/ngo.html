<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sthiti AI | NGO Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-warm: #FCF9F6; --primary: #F59E0B; --dark: #1A1A1A; --success: #10B981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-warm); font-family: 'Inter', sans-serif; color: var(--dark); }

        /* Header */
        nav { padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; border-left: 5px solid var(--primary); padding-left: 15px; }

        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .stat-card span { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 2.2rem; margin-top: 5px; color: var(--dark); }

        /* Table Styling */
        .table-container { background: white; border-radius: 30px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; font-size: 0.8rem; color: #888; text-transform: uppercase; border-bottom: 1px solid #f5f5f5; }
        td { padding: 20px; border-bottom: 1px solid #f9f9f9; vertical-align: middle; }

        .img-thumb { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; }
        
        /* Progress System */
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: 1s ease-in-out; }

        .priority-tag { padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .high { background: #FEE2E2; color: #991B1B; }
        .med { background: #FEF3C7; color: #92400E; }

        .btn-action { background: var(--dark); color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-logout { background: transparent; border: 1px solid #ddd; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Sthiti NGO</div>
    <button class="btn-logout" onclick="window.location.href='/'">Logout</button>
</nav>

<div class="container">
    <div class="header-flex">
        <div>
            <h1>Command Center</h1>
            <p style="color:#666;">Active humanitarian monitoring for Hyderabad District.</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>Total Reports</span><h2 id="total-count">0</h2></div>
        <div class="stat-card"><span>Pending Aid</span><h2 id="pending-count">0</h2></div>
        <div class="stat-card"><span>Resources Active</span><h2>12 Units</h2></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Evidence</th>
                    <th>Incident Details</th>
                    <th>Priority</th>
                    <th>Rescue Progress</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="ngo-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 🧬 Shared Logic: This pulls the same data your citizen app uploads
    function loadNGODashboard() {
        const reports = JSON.parse(localStorage.getItem('sthiti_db')) || [];
        const tbody = document.getElementById('ngo-table-body');
        
        document.getElementById('total-count').innerText = reports.length;
        document.getElementById('pending-count').innerText = reports.filter(r => (r.score * 10) < 100).length;

        tbody.innerHTML = reports.map(item => {
            const progress = item.score * 10; // AI score 8 = 80% progress
            const priorityClass = item.score >= 7 ? 'high' : 'med';
            
            return `
                <tr>
                    <td><img src="${item.image}" class="img-thumb"></td>
                    <td>
                        <div style="font-weight:600; font-size:0.95rem;">${item.description}</div>
                        <div style="font-size:0.75rem; color:#888; margin-top:4px;">📍 ${item.location.lat.toFixed(4)}, ${item.location.lng.toFixed(4)}</div>
                    </td>
                    <td>
                        <span class="priority-tag ${priorityClass}">
                            ${item.score >= 7 ? '🔥 CRITICAL' : '⚡ STANDARD'}
                        </span>
                    </td>
                    <td>
                        <div style="font-size:0.75rem; font-weight:600; color:#666;">${progress}% RESOLVED</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </td>
                    <td>
                        <button class="btn-action" onclick="alert('Aid Dispatched to coordinates!')">Dispatch</button>
                    </td>
                </tr>
            `;
        }).reverse().join('');
    }

    window.onload = loadNGODashboard;
</script>

</body>
</html>
