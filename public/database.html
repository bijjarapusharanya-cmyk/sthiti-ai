<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sthiti AI | Humanitarian Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-warm: #FCF9F6; --primary: #F59E0B; --dark: #1A1A1A; }
        body { background: var(--bg-warm); font-family: 'Inter', sans-serif; padding: 40px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px; }
        
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; flex: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: var(--dark); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 15px; }
        th { text-align: left; padding: 15px; color: #888; font-size: 0.8rem; text-transform: uppercase; }
        td { background: white; padding: 20px; vertical-align: middle; }
        td:first-child { border-radius: 20px 0 0 20px; }
        td:last-child { border-radius: 0 20px 20px 0; }

        .img-preview { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 2px solid var(--bg-warm); }
        
        /* Progress Bar */
        .progress-container { width: 150px; background: #eee; border-radius: 10px; height: 10px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); transition: 0.5s; }
        
        .status-tag { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
        .pending { background: #FFFBEB; color: #B45309; }
        .completed { background: #ECFDF5; color: #059669; }

        .btn-back { background: var(--dark); color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

    <a href="/dashboard" class="btn-back">⬅ Back to Map</a>
    <h1>Humanitarian Logs</h1>

    <div class="stats-row">
        <div class="stat-card"><h3>Total Cases</h3><p id="totalCount">0</p></div>
        <div class="stat-card"><h3>Resolved</h3><p id="resolvedCount">0</p></div>
        <div class="stat-card"><h3>Pending Aid</h3><p id="pendingCount">0</p></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Scene</th>
                <th>Description</th>
                <th>Location</th>
                <th>Impact Score</th>
                <th>Resolution Progress</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="logTable">
            </tbody>
    </table>

<script>
    // FAKE DATA GENERATOR (If local storage is empty)
    const fakeData = [
        { image: "https://images.unsplash.com/photo-1531206715517-5c0ba140b2b8?auto=format&fit=crop&w=100", desc: "Street accumulation near Secunderabad", loc: "17.4399, 78.4983", score: 8, progress: 100, status: "Completed" },
        { image: "https://images.unsplash.com/photo-1516738901171-8eb4fc13bd20?auto=format&fit=crop&w=100", desc: "Pothole hazard on Jubilee Hills Rd", loc: "17.4239, 78.4066", score: 6, progress: 40, status: "In Progress" }
    ];

    function loadLogs() {
        const tbody = document.getElementById('logTable');
        // Merge real uploads from localStorage with fake data for the demo
        const realData = JSON.parse(localStorage.getItem('sthiti_db')) || [];
        const allData = [...realData, ...fakeData];

        document.getElementById('totalCount').innerText = allData.length;
        document.getElementById('resolvedCount').innerText = allData.filter(d => d.status === "Completed" || d.progress === 100).length;
        document.getElementById('pendingCount').innerText = allData.filter(d => d.status !== "Completed").length;

        tbody.innerHTML = allData.map(caseItem => `
            <tr>
                <td><img src="${caseItem.image}" class="img-preview"></td>
                <td><div style="max-width:250px; font-weight:600;">${caseItem.description}</div><div style="font-size:0.7rem; color:#888;">${caseItem.timestamp || 'Historical'}</div></td>
                <td><code style="background:#eee; padding:4px; border-radius:5px;">${typeof caseItem.location === 'object' ? caseItem.location.lat.toFixed(4) + ', ' + caseItem.location.lng.toFixed(4) : caseItem.loc}</code></td>
                <td><b style="color:var(--primary)">${caseItem.score}/10</b></td>
                <td>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${caseItem.progress || (caseItem.score * 10)}%"></div>
                    </div>
                    <span style="font-size:0.7rem; color:#888;">${caseItem.progress || (caseItem.score * 10)}% Done</span>
                </td>
                <td>
                    <span class="status-tag ${caseItem.progress === 100 ? 'completed' : 'pending'}">
                        ${caseItem.progress === 100 ? '✅ Resolved' : '⏳ Active'}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    window.onload = loadLogs;
</script>
</body>
</html>
